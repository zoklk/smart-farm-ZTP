apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v18.2.2 # 최신 안정 버전
    allowUnsupported: false
  dataDirHostPath: /var/lib/rook
  mon:
    count: 1             # Single Node이므로 1개
    allowMultiplePerNode: true
  mgr:
    count: 1
    allowMultiplePerNode: true
  dashboard:
    enabled: true
    ssl: false
  monitoring:
    enabled: false       # 리소스 절약을 위해 비활성화 (필요 시 true)
  storage:
    useAllDevices: false
    nodes:
    - name
    config:
      osdsPerDevice: "1"
  resources: # 리소스 제한을 두어 시스템 과부하 방지 (선택 사항)
    mgr:
      limits:
        memory: "1Gi"
    mon:
      limits:
        memory: "2Gi"
    osd:
      limits:
        memory: "4Gi"