apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-edge
  labels:
    app: nginx-edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-edge
  template:
    metadata:
      labels:
        app: nginx-edge
    spec:
      nodeSelector:
        kubernetes.io/hostname: edge-server1
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi
