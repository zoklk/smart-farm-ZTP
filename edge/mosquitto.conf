# 개발/테스트 환경용 - 평문 MQTT 설정

# 리스너 설정
listener 1883
protocol mqtt

# 인증 비활성화 (개발용)
allow_anonymous true

# 로깅
log_dest file /var/log/mosquitto/mosquitto.log
log_type all
log_timestamp true

# 최대 연결 수
max_connections 100

# 메시지 크기 제한 (10MB)
message_size_limit 10485760

# Persistence
persistence true
persistence_location /var/lib/mosquitto/

# QoS
max_queued_messages 1000
